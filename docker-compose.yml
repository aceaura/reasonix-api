services:
  reasonix-api:
    build: .
    ports:
      - "8088:8088"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - API_KEY=${API_KEY:-}
      - PORT=8088
      - HOST=0.0.0.0
      - SESSION_TTL_MINUTES=${SESSION_TTL_MINUTES:-60}
      - MAX_CONCURRENT_SESSIONS=${MAX_CONCURRENT_SESSIONS:-100}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-chat}
      - MODEL_GPT_4O=${MODEL_GPT_4O:-deepseek-chat}
      - MAX_TOKENS=${MAX_TOKENS:-4096}
      - BUDGET_USD=${BUDGET_USD:-10}
      - REASONING_EFFORT=${REASONING_EFFORT:-high}
      - ENABLE_RESPONSE_CACHE=${ENABLE_RESPONSE_CACHE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      # Auth is always on (client key = DeepSeek key), so the probe must send it.
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header=\"Authorization: Bearer ${API_KEY:-$DEEPSEEK_API_KEY}\" http://127.0.0.1:8088/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
